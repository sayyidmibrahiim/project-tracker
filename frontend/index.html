<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Tracker DBS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              mocha: {
                orange: '#BC6C2C',
                dark: '#2D3D34',
                light: '#D0D4D2',
                sage: '#ADB9B2',
                olive: '#949A89',
                ink: '#18231D',
              },
            },
            fontFamily: {
              display: ['Georgia', 'serif'],
              body: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
            },
            boxShadow: {
              ember: '0 0 48px rgba(188, 108, 44, 0.28)',
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --c-orange: #bc6c2c;
        --c-dark: #2d3d34;
        --c-light: #d0d4d2;
        --c-sage: #adb9b2;
        --c-olive: #949a89;
        --c-ink: #18231d;
      }

      body {
        background:
          radial-gradient(circle at 18% 12%, rgba(188, 108, 44, 0.26), transparent 28rem),
          radial-gradient(circle at 86% 18%, rgba(173, 185, 178, 0.16), transparent 24rem),
          linear-gradient(135deg, var(--c-ink), var(--c-dark));
      }

      .grain::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.08;
        background-image:
          linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px),
          linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(to bottom, black, transparent 78%);
      }

      .panel-edge {
        border: 1px solid rgba(208, 212, 210, 0.16);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 28px 90px rgba(0, 0, 0, 0.35);
      }
    </style>
  </head>
  <body class="grain min-h-screen overflow-hidden text-mocha-light antialiased">
    <main class="relative mx-auto flex min-h-screen max-w-7xl items-center px-6 py-10">
      <section class="grid w-full gap-8 lg:grid-cols-[0.9fr_1.1fr]">
        <div class="space-y-8">
          <div class="inline-flex items-center gap-3 rounded-full border border-mocha-sage/20 bg-mocha-light/5 px-4 py-2 font-body text-xs uppercase tracking-[0.32em] text-mocha-sage">
            <span class="h-2 w-2 rounded-full bg-mocha-orange shadow-ember"></span>
            pywebview bridge
          </div>

          <div class="space-y-5">
            <h1 class="font-display text-6xl leading-[0.92] tracking-[-0.06em] text-mocha-light md:text-7xl">
              Project<br />Tracker DBS
            </h1>
            <p class="max-w-xl font-body text-sm leading-7 text-mocha-sage">
              HTML/Tailwind shell running inside pywebview. Catppuccin Mocha base, local-first desktop workflow, Python bridge ready for service wiring.
            </p>
          </div>

          <button
            id="testConnection"
            class="group rounded-2xl bg-mocha-orange px-6 py-4 font-body text-sm font-semibold uppercase tracking-[0.22em] text-mocha-ink shadow-ember transition duration-200 hover:-translate-y-0.5 hover:bg-[#D0833D] focus:outline-none focus:ring-2 focus:ring-mocha-light/70"
          >
            Test Connection
            <span class="ml-3 inline-block transition group-hover:translate-x-1">→</span>
          </button>
        </div>

        <div class="panel-edge relative overflow-hidden rounded-[2rem] bg-mocha-ink/70 p-6 backdrop-blur-xl">
          <div class="absolute right-6 top-6 h-20 w-20 rounded-full border border-mocha-orange/40"></div>
          <div class="absolute -right-10 -top-10 h-36 w-36 rounded-full bg-mocha-orange/10 blur-2xl"></div>

          <div class="relative space-y-5">
            <div class="flex items-center justify-between border-b border-mocha-light/10 pb-4">
              <div>
                <p class="font-body text-xs uppercase tracking-[0.28em] text-mocha-olive">Response</p>
                <h2 class="mt-2 font-display text-3xl tracking-[-0.04em]">Bridge payload</h2>
              </div>
              <span id="status" class="rounded-full bg-mocha-light/10 px-3 py-1 font-body text-xs text-mocha-sage">idle</span>
            </div>

            <div id="output" class="min-h-80 rounded-3xl border border-mocha-light/10 bg-black/20 p-5 font-body text-sm leading-6 text-mocha-sage">
              Click Test Connection to call <span class="text-mocha-orange">pywebview.api.get_projects()</span>.
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const button = document.getElementById('testConnection');
      const output = document.getElementById('output');
      const status = document.getElementById('status');

      function renderProjects(projects) {
        output.innerHTML = projects.map((project) => `
          <article class="mb-3 rounded-2xl border border-mocha-light/10 bg-mocha-light/[0.03] p-4">
            <div class="flex items-start justify-between gap-4">
              <div>
                <p class="text-mocha-light">${project.name}</p>
                <p class="mt-1 text-xs uppercase tracking-[0.2em] text-mocha-olive">${project.id} · ${project.owner}</p>
              </div>
              <span class="rounded-full border border-mocha-orange/30 px-3 py-1 text-xs text-mocha-orange">${project.state}</span>
            </div>
            <p class="mt-3 text-xs text-mocha-sage">Year: ${project.year}</p>
          </article>
        `).join('');
      }

      button.addEventListener('click', async () => {
        status.textContent = 'calling';
        output.textContent = 'Calling Python bridge...';

        try {
          if (!window.pywebview?.api?.get_projects) {
            throw new Error('pywebview.api.get_projects is not available');
          }

          const projects = await window.pywebview.api.get_projects();
          renderProjects(projects);
          status.textContent = `ok · ${projects.length} projects`;
        } catch (error) {
          output.textContent = error.message;
          status.textContent = 'error';
        }
      });
    </script>
  </body>
</html>
