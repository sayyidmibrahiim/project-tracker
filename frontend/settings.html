<!doctype html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Settings · Project Tracker DBS</title><script src="assets/tailwind.min.js"></script><script>tailwind.config={theme:{extend:{colors:{dbs:{bg:'#0b0b0d',panel:'#151518',card:'#ffffff',ink:'#111827',muted:'#6b7280',line:'#d1d5db',red:'#b91c1c',red2:'#991b1b',soft:'#f3f4f6',ok:'#166534',warn:'#92400e'}},fontFamily:{ui:['Segoe UI','Arial','sans-serif']}}}};</script></head>
<body class="min-h-screen bg-dbs-soft font-ui text-dbs-ink"><main class="mx-auto max-w-5xl p-6"><header class="mb-4 flex items-center justify-between"><div><p class="text-xs font-black uppercase tracking-widest text-dbs-red">Settings</p><h1 class="text-3xl font-black">Workspace Configuration</h1></div><a href="dashboard.html" class="rounded border border-dbs-line bg-white px-3 py-2 text-sm font-bold">← Dashboard</a></header><div id="status" class="mb-4 hidden rounded border bg-white p-3 text-sm font-bold"></div><section class="grid gap-4 md:grid-cols-2"><form class="rounded border border-dbs-line bg-white p-4"><h2 class="text-lg font-black">Profile</h2><label class="mt-3 block text-xs font-bold text-dbs-muted">Display name<input id="displayName" class="mt-1 w-full rounded border border-dbs-line p-2 text-sm"/></label><label class="mt-3 block text-xs font-bold text-dbs-muted">Theme<select id="theme" class="mt-1 w-full rounded border border-dbs-line p-2 text-sm"><option value="dark">Dark</option><option value="light">Light</option></select></label><label class="mt-3 block text-xs font-bold text-dbs-muted">T-10 threshold days<input id="t10" type="number" class="mt-1 w-full rounded border border-dbs-line p-2 text-sm"/></label><button id="saveBtn" type="button" class="mt-4 rounded bg-dbs-red px-4 py-2 text-sm font-black text-white">Save Settings</button></form><section class="rounded border border-dbs-line bg-white p-4"><h2 class="text-lg font-black">Folders</h2><p class="mt-2 text-sm text-dbs-muted">Root folder remains local filesystem source of truth.</p><div id="rootFolder" class="mt-3 rounded bg-dbs-soft p-3 text-sm font-mono text-dbs-muted">—</div><button id="chooseBtn" class="mt-3 rounded border border-dbs-line px-4 py-2 text-sm font-bold">Choose Root Folder</button><a href="dashboard.html" class="ml-2 inline-block rounded border border-dbs-line px-4 py-2 text-sm font-bold">Back to Dashboard</a></section></section></main><script>
const api=()=>window.pywebview&&window.pywebview.api;function msg(t,err=false){status.className=`mb-4 rounded border bg-white p-3 text-sm font-bold ${err?'border-dbs-red text-dbs-red':'border-dbs-line text-dbs-ink'}`;status.textContent=t;status.classList.remove('hidden')}function fill(s){displayName.value=s.display_name||'';theme.value=s.theme||'dark';t10.value=s.t10_threshold_days||10;rootFolder.textContent=s.root_folder||'Not configured'}async function load(){if(!api()?.get_settings)return msg('pywebview settings bridge unavailable.',true);fill(await api().get_settings())}saveBtn.onclick=async()=>{if(!api()?.save_settings)return msg('save_settings bridge unavailable.',true);const r=await api().save_settings({display_name:displayName.value,theme:theme.value,t10_threshold_days:Number(t10.value||10)});msg(r.ok?'Settings saved.':r.error,!r.ok);if(r.ok)fill(r.settings)};chooseBtn.onclick=async()=>{if(!api()?.choose_root_folder)return msg('choose_root_folder bridge unavailable.',true);const r=await api().choose_root_folder();msg(r.ok?'Root folder updated.':r.error,!r.ok);if(r.ok)fill(r.settings)};load();
</script></body></html>
