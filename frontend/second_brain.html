<!doctype html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Second Brain · Project Tracker DBS</title><script src="assets/tailwind.min.js"></script><script>tailwind.config={theme:{extend:{colors:{dbs:{bg:'#0b0b0d',panel:'#151518',card:'#ffffff',ink:'#111827',muted:'#6b7280',line:'#d1d5db',red:'#b91c1c',red2:'#991b1b',soft:'#f3f4f6',ok:'#166534',warn:'#92400e'}},fontFamily:{ui:['Segoe UI','Arial','sans-serif']}}}};</script></head><body class="min-h-screen bg-dbs-soft font-ui text-dbs-ink"><main class="mx-auto max-w-7xl p-6"><header class="mb-4 flex items-center justify-between"><div><p class="text-xs font-black uppercase tracking-widest text-dbs-red">Second Brain</p><h1 class="text-3xl font-black">Notes and Link Bank</h1></div><a href="dashboard.html" class="rounded border border-dbs-line bg-white px-3 py-2 text-sm font-bold">← Dashboard</a></header><div id="status" class="mb-4 hidden rounded border bg-white p-3 text-sm font-bold"></div><section class="grid gap-4 lg:grid-cols-[320px_1fr_340px]"><aside class="rounded border border-dbs-line bg-white p-4"><h2 class="text-lg font-black">Projects</h2><input id="projectSearch" class="mt-3 w-full rounded border border-dbs-line p-2 text-sm" placeholder="Search project..."/><div id="projectList" class="mt-3 max-h-[560px] space-y-2 overflow-auto text-sm"></div></aside><section class="rounded border border-dbs-line bg-white p-4"><h2 class="text-lg font-black">Project Notes</h2><p id="selectedPath" class="mt-1 text-xs text-dbs-muted">Select project to append note.</p><textarea id="noteText" class="mt-3 h-[420px] w-full rounded border border-dbs-line p-3 text-sm" placeholder="Write note to append to project_data.json..."></textarea><button id="noteBtn" class="mt-3 rounded bg-dbs-red px-4 py-2 text-sm font-black text-white">Append Note</button><pre id="notesView" class="mt-3 max-h-40 overflow-auto whitespace-pre-wrap rounded bg-dbs-soft p-3 text-xs text-dbs-muted"></pre></section><aside class="rounded border border-dbs-line bg-white p-4"><h2 class="text-lg font-black">Link Bank</h2><label class="mt-3 block text-xs font-bold text-dbs-muted">Name<input id="linkName" class="mt-1 w-full rounded border border-dbs-line p-2 text-sm"/></label><label class="mt-3 block text-xs font-bold text-dbs-muted">URL<input id="linkUrl" class="mt-1 w-full rounded border border-dbs-line p-2 text-sm" placeholder="https://..."/></label><label class="mt-3 block text-xs font-bold text-dbs-muted">Category<input id="linkCategory" class="mt-1 w-full rounded border border-dbs-line p-2 text-sm"/></label><label class="mt-3 block text-xs font-bold text-dbs-muted">Notes<textarea id="linkNotes" class="mt-1 h-20 w-full rounded border border-dbs-line p-2 text-sm"></textarea></label><button id="saveLinkBtn" class="mt-3 rounded border border-dbs-line px-4 py-2 text-sm font-bold">Save Link</button><pre id="linkResult" class="mt-3 max-h-40 overflow-auto rounded bg-dbs-soft p-3 text-xs text-dbs-muted"></pre></aside></section></main><script>
const api=()=>window.pywebview&&window.pywebview.api;const esc=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');let projects=[],selected=null;function msg(t,err=false){status.className=`mb-4 rounded border bg-white p-3 text-sm font-bold ${err?'border-dbs-red text-dbs-red':'border-dbs-line text-dbs-ink'}`;status.textContent=t;status.classList.remove('hidden')}function renderProjects(){const q=projectSearch.value.toLowerCase();const rows=projects.filter(p=>[p.name,p.path,p.cr_state,p.state].join(' ').toLowerCase().includes(q));projectList.innerHTML=rows.map((p,i)=>`<button data-i="${i}" class="block w-full rounded border border-dbs-line p-2 text-left hover:border-dbs-red"><span class="font-black text-dbs-red">${esc(p.name||'Untitled')}</span><br><span class="text-xs text-dbs-muted">${esc(p.state||'—')} · ${esc(p.year||'—')}</span></button>`).join('')||'<p class="text-dbs-muted">No projects found.</p>';projectList.querySelectorAll('button').forEach(b=>b.onclick=()=>selectProject(rows[Number(b.dataset.i)]))}function selectProject(p){selected=p;selectedPath.textContent=p.path||'—';notesView.textContent=(p.metadata&&p.metadata.notes)||p.notes||''}async function load(){if(!api()?.get_projects)return msg('pywebview bridge unavailable.',true);projects=await api().get_projects();renderProjects();if(!projects.length)msg('No projects loaded. Configure root folder first.')}projectSearch.oninput=renderProjects;noteBtn.onclick=async()=>{if(!selected)return msg('Select project first.',true);if(!api()?.create_note)return msg('create_note bridge unavailable.',true);const r=await api().create_note(selected.path,noteText.value);msg(r.ok?'Note appended.':r.error,!r.ok);if(r.ok){noteText.value='';await load();const refreshed=projects.find(p=>p.path===selected.path);if(refreshed)selectProject(refreshed)}};saveLinkBtn.onclick=async()=>{if(!api()?.save_link)return msg('save_link bridge unavailable.',true);const r=await api().save_link({name:linkName.value,url:linkUrl.value,category:linkCategory.value,notes:linkNotes.value});linkResult.textContent=JSON.stringify(r,null,2);msg(r.ok?'Link saved.':r.error,!r.ok)};load();
</script></body></html>
