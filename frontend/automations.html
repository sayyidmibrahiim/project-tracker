<!doctype html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Automations · Project Tracker DBS</title><script src="assets/tailwind.min.js"></script><script>tailwind.config={theme:{extend:{colors:{dbs:{bg:'#0b0b0d',panel:'#151518',card:'#ffffff',ink:'#111827',muted:'#6b7280',line:'#d1d5db',red:'#b91c1c',red2:'#991b1b',soft:'#f3f4f6',ok:'#166534',warn:'#92400e'}},fontFamily:{ui:['Segoe UI','Arial','sans-serif']}}}};</script></head><body class="min-h-screen bg-dbs-soft font-ui text-dbs-ink"><main class="mx-auto max-w-6xl p-6"><header class="mb-4 flex items-center justify-between"><div><p class="text-xs font-black uppercase tracking-widest text-dbs-red">Automations</p><h1 class="text-3xl font-black">Email, Teams, Download Rules</h1></div><a href="dashboard.html" class="rounded border border-dbs-line bg-white px-3 py-2 text-sm font-bold">← Dashboard</a></header><div id="status" class="mb-4 hidden rounded border bg-white p-3 text-sm font-bold"></div><section class="grid gap-4 lg:grid-cols-3"><article class="rounded border border-dbs-line bg-white p-4"><h2 class="text-lg font-black">Email Rule</h2><label class="mt-3 block text-xs font-bold text-dbs-muted">Project path<input id="emailPath" class="mt-1 w-full rounded border border-dbs-line p-2 text-sm" placeholder="Select from dashboard/detail"/></label><label class="mt-3 block text-xs font-bold text-dbs-muted">Category<select id="emailCategory" class="mt-1 w-full rounded border border-dbs-line p-2 text-sm"><option>ACK_UAT</option><option>ACK_SOP</option><option>APRVL_CR</option><option>APRVL_SOP</option></select></label><button id="emailBtn" class="mt-4 rounded bg-dbs-red px-4 py-2 text-sm font-black text-white">Render Email</button></article><article class="rounded border border-dbs-line bg-white p-4"><h2 class="text-lg font-black">Teams Message</h2><label class="mt-3 block text-xs font-bold text-dbs-muted">Target email<input id="teamsEmail" class="mt-1 w-full rounded border border-dbs-line p-2 text-sm"/></label><label class="mt-3 block text-xs font-bold text-dbs-muted">Message<textarea id="teamsMessage" class="mt-1 h-24 w-full rounded border border-dbs-line p-2 text-sm">Deployment reminder ready.</textarea></label><button id="teamsBtn" class="mt-4 rounded bg-dbs-ink px-4 py-2 text-sm font-black text-white">Prepare</button></article><article class="rounded border border-dbs-line bg-white p-4"><h2 class="text-lg font-black">Download Email</h2><p class="mt-2 text-sm text-dbs-muted">Backend adapter currently explicit TODO.</p><button id="downloadBtn" class="mt-4 rounded border border-dbs-line px-4 py-2 text-sm font-bold">Start Job</button></article></section><section class="mt-4 rounded border border-dbs-line bg-white p-4"><h2 class="text-lg font-black">Result</h2><pre id="result" class="mt-3 min-h-32 overflow-auto rounded bg-dbs-soft p-3 text-xs text-dbs-muted"></pre></section></main><script>
const api=()=>window.pywebview&&window.pywebview.api;function msg(t,err=false){status.className=`mb-4 rounded border bg-white p-3 text-sm font-bold ${err?'border-dbs-red text-dbs-red':'border-dbs-line text-dbs-ink'}`;status.textContent=t;status.classList.remove('hidden')}function show(o){result.textContent=JSON.stringify(o,null,2)}emailBtn.onclick=async()=>{if(!api()?.run_email_rule)return msg('run_email_rule bridge unavailable.',true);const r=await api().run_email_rule(emailPath.value,emailCategory.value);show(r);msg(r.ok?'Email rendered.':r.error,!r.ok)};teamsBtn.onclick=async()=>{if(!api()?.prepare_teams_message)return msg('prepare_teams_message bridge unavailable.',true);const r=await api().prepare_teams_message({target_email:teamsEmail.value,message:teamsMessage.value});show(r);msg(r.ok?'Teams payload prepared.':r.error,!r.ok)};downloadBtn.onclick=async()=>{if(!api()?.start_download_email)return msg('start_download_email bridge unavailable.',true);const r=await api().start_download_email({});show(r);msg(r.ok?'Download job started.':r.error,!r.ok)};
</script></body></html>
