<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Detail · Project Tracker DBS</title>
  <script src="assets/tailwind.min.js"></script>
  <script>tailwind.config={theme:{extend:{colors:{dbs:{bg:'#0b0b0d',panel:'#151518',card:'#ffffff',ink:'#111827',muted:'#6b7280',line:'#d1d5db',red:'#b91c1c',red2:'#991b1b',soft:'#f3f4f6',ok:'#166534',warn:'#92400e'}},fontFamily:{ui:['Segoe UI','Arial','sans-serif']}}}};</script>
</head>
<body class="min-h-screen bg-dbs-soft font-ui text-dbs-ink">
<main class="mx-auto max-w-6xl p-6">
  <header class="mb-4 flex items-center justify-between"><div><p class="text-xs font-black uppercase tracking-widest text-dbs-red">Project Detail</p><h1 id="title" class="text-3xl font-black">Loading...</h1></div><a href="dashboard.html" class="rounded border border-dbs-line bg-white px-3 py-2 text-sm font-bold">← Dashboard</a></header>
  <div id="status" class="mb-4 hidden rounded border bg-white p-3 text-sm font-bold"></div>
  <section class="grid gap-4 lg:grid-cols-[360px_1fr]">
    <aside class="rounded border border-dbs-line bg-white p-4">
      <h2 class="text-lg font-black">Metadata</h2>
      <label class="mt-3 block text-xs font-bold text-dbs-muted">Project name<input id="projectName" class="mt-1 w-full rounded border border-dbs-line p-2 text-sm"/></label>
      <label class="mt-3 block text-xs font-bold text-dbs-muted">CR link / number<input id="crLink" class="mt-1 w-full rounded border border-dbs-line p-2 text-sm"/></label>
      <label class="mt-3 block text-xs font-bold text-dbs-muted">Start datetime<input id="startDatetime" class="mt-1 w-full rounded border border-dbs-line p-2 text-sm"/></label>
      <label class="mt-3 block text-xs font-bold text-dbs-muted">End datetime<input id="endDatetime" class="mt-1 w-full rounded border border-dbs-line p-2 text-sm"/></label>
      <button id="saveBtn" class="mt-4 w-full rounded bg-dbs-red px-4 py-2 text-sm font-black text-white">Save Project</button>
    </aside>
    <section class="space-y-4">
      <div class="rounded border border-dbs-line bg-white p-4"><h2 class="text-lg font-black">State</h2><div id="stateBlock" class="mt-2 text-sm text-dbs-muted"></div><div class="mt-3 flex flex-wrap gap-2"><button data-action="prod_ready" class="transition rounded border border-dbs-line px-3 py-2 text-sm font-bold">Move PROD_READY</button><button data-action="implemented" class="transition rounded border border-dbs-line px-3 py-2 text-sm font-bold">Move IMPLEMENTED</button><button data-action="postpone" class="transition rounded border border-dbs-line px-3 py-2 text-sm font-bold">Postpone</button><button data-action="resume" class="transition rounded border border-dbs-line px-3 py-2 text-sm font-bold">Resume</button></div></div>
      <div class="rounded border border-dbs-line bg-white p-4"><h2 class="text-lg font-black">Subprojects</h2><div id="subprojects" class="mt-2 text-sm text-dbs-muted">—</div></div>
      <div class="rounded border border-dbs-line bg-white p-4"><h2 class="text-lg font-black">Notes</h2><textarea id="noteText" class="mt-2 h-32 w-full rounded border border-dbs-line p-3 text-sm" placeholder="Add note..."></textarea><button id="noteBtn" class="mt-2 rounded bg-dbs-ink px-3 py-2 text-sm font-bold text-white">Append Note</button><pre id="notes" class="mt-3 whitespace-pre-wrap rounded bg-dbs-soft p-3 text-xs text-dbs-muted"></pre></div>
    </section>
  </section>
</main>
<script>
const api=()=>window.pywebview&&window.pywebview.api;const q=new URLSearchParams(location.search);const path=q.get('path')||'';const esc=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');let current=null;
function msg(t,err=false){status.className=`mb-4 rounded border bg-white p-3 text-sm font-bold ${err?'border-dbs-red text-dbs-red':'border-dbs-line text-dbs-ink'}`;status.textContent=t;status.classList.remove('hidden')}
function fill(p){current=p;const md=p.metadata||{};title.textContent=p.name||md.project_name||'Project';projectName.value=p.name||md.project_name||'';crLink.value=p.cr_link||md.cr_link||'';startDatetime.value=p.start_datetime||md.start_datetime||'';endDatetime.value=p.end_datetime||md.end_datetime||'';stateBlock.textContent=`Folder: ${p.state||'—'} · CR: ${p.cr_state||md.cr_state||'—'} · Path: ${p.path}`;subprojects.innerHTML=(p.subprojects||[]).map(esc).join('<br>')||'No subprojects found.';notes.textContent=md.notes||p.notes||''}
async function load(){if(!path){msg('No project selected. Open a row from Dashboard.',true);return}if(!api()?.get_projects){msg('pywebview bridge unavailable.',true);return}const projects=await api().get_projects();const found=(projects||[]).find(p=>p.path===path||p.id===path);found?fill(found):msg('Project not found in current scan.',true)}
saveBtn.onclick=async()=>{if(!api()?.save_project||!current)return msg('save_project bridge unavailable.',true);const r=await api().save_project({path:current.path,project_name:projectName.value,name:projectName.value,cr_link:crLink.value,start_datetime:startDatetime.value||null,end_datetime:endDatetime.value||null});msg(r.ok?'Project saved.':r.error,!r.ok);if(r.ok)load()};
noteBtn.onclick=async()=>{if(!api()?.create_note||!current)return msg('create_note bridge unavailable.',true);const r=await api().create_note(current.path,noteText.value);msg(r.ok?'Note appended.':r.error,!r.ok);if(r.ok){noteText.value='';load()}};
document.querySelectorAll('.transition').forEach(b=>b.onclick=async()=>{if(!api()?.transition_project||!current)return msg('transition_project bridge unavailable.',true);const r=await api().transition_project(current.path,b.dataset.action);msg(r.ok?'Transition complete.':r.error,!r.ok);if(r.ok)load()});
load();
</script>
</body></html>
