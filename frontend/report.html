<!doctype html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Report</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{mocha:{base:'#1e1e2e',mantle:'#181825',crust:'#11111b',text:'#cdd6f4',subtext:'#a6adc8',surface:'#313244',peach:'#fab387',green:'#a6e3a1',mauve:'#cba6f7',red:'#f38ba8',yellow:'#f9e2af'}}}}}</script></head><body class="min-h-screen bg-mocha-base text-mocha-text"><main class="mx-auto max-w-7xl p-6"><header class="mb-6 flex items-center justify-between"><div><p class="text-xs uppercase tracking-[0.35em] text-mocha-peach">Reports</p><h1 class="text-4xl font-bold">Operational Snapshot</h1></div><a href="dashboard.html" class="text-mocha-subtext">← Dashboard</a></header><section class="rounded-2xl bg-mocha-mantle p-5"><div class="flex flex-wrap items-center gap-3"><select class="rounded-xl bg-mocha-crust p-3"><option>2026</option></select><select class="rounded-xl bg-mocha-crust p-3"><option>All states</option></select><button onclick="bridge('generate_report')" class="rounded-xl bg-mocha-peach px-4 py-3 text-mocha-crust">Generate</button></div></section><section class="mt-6 grid gap-4 md:grid-cols-3"><article class="rounded-2xl bg-mocha-mantle p-5"><p class="text-mocha-subtext">Completed</p><p class="mt-2 text-4xl font-bold text-mocha-green">21</p></article><article class="rounded-2xl bg-mocha-mantle p-5"><p class="text-mocha-subtext">Blocked</p><p class="mt-2 text-4xl font-bold text-mocha-red">3</p></article><article class="rounded-2xl bg-mocha-mantle p-5"><p class="text-mocha-subtext">Pending</p><p class="mt-2 text-4xl font-bold text-mocha-yellow">9</p></article></section><section class="mt-6 rounded-2xl bg-mocha-mantle p-5"><h2 class="text-xl font-semibold">Breakdown</h2><div class="mt-4 space-y-3"><div class="h-4 rounded-full bg-mocha-crust"><div class="h-4 w-2/3 rounded-full bg-mocha-green"></div></div><div class="h-4 rounded-full bg-mocha-crust"><div class="h-4 w-1/3 rounded-full bg-mocha-peach"></div></div><div class="h-4 rounded-full bg-mocha-crust"><div class="h-4 w-1/5 rounded-full bg-mocha-red"></div></div></div></section></main><script>function bridge(action,payload={}){if(window.pywebview?.api?.[action])return window.pywebview.api[action](payload);console.log('pywebview fallback',action,payload)}</script></body></html>
