<!doctype html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Reports · Project Tracker DBS</title><script src="assets/tailwind.min.js"></script><script>tailwind.config={theme:{extend:{colors:{dbs:{bg:'#0b0b0d',panel:'#151518',card:'#ffffff',ink:'#111827',muted:'#6b7280',line:'#d1d5db',red:'#b91c1c',red2:'#991b1b',soft:'#f3f4f6',ok:'#166534',warn:'#92400e'}},fontFamily:{ui:['Segoe UI','Arial','sans-serif']}}}};</script></head><body class="min-h-screen bg-dbs-soft font-ui text-dbs-ink"><main class="mx-auto max-w-6xl p-6"><header class="mb-4 flex items-center justify-between"><div><p class="text-xs font-black uppercase tracking-widest text-dbs-red">Reports</p><h1 class="text-3xl font-black">Operational Snapshot</h1></div><a href="dashboard.html" class="rounded border border-dbs-line bg-white px-3 py-2 text-sm font-bold">← Dashboard</a></header><div id="status" class="mb-4 hidden rounded border bg-white p-3 text-sm font-bold"></div><section class="rounded border border-dbs-line bg-white p-4"><div class="flex flex-wrap gap-2"><select id="yearFilter" class="rounded border border-dbs-line p-2 text-sm"><option value="all">All years</option></select><select id="stateFilter" class="rounded border border-dbs-line p-2 text-sm"><option value="all">All states</option></select><button id="generateBtn" class="rounded bg-dbs-red px-4 py-2 text-sm font-black text-white">Generate Backend Report</button></div></section><section id="cards" class="mt-4 grid gap-4 md:grid-cols-4"></section><section class="mt-4 rounded border border-dbs-line bg-white p-4"><h2 class="text-lg font-black">Breakdown</h2><div id="breakdown" class="mt-3 space-y-2"></div></section></main><script>
const api=()=>window.pywebview&&window.pywebview.api;const state=v=>String(v||'UNKNOWN').replaceAll('-','_').replaceAll(' ','_').toUpperCase();let projects=[];function msg(t,err=false){status.className=`mb-4 rounded border bg-white p-3 text-sm font-bold ${err?'border-dbs-red text-dbs-red':'border-dbs-line text-dbs-ink'}`;status.textContent=t;status.classList.remove('hidden')}function norm(p){return{year:p.year||'—',state:state(p.state),crState:state(p.cr_state)}}function filtered(){return projects.filter(p=>(yearFilter.value==='all'||String(p.year)===yearFilter.value)&&(stateFilter.value==='all'||p.state===stateFilter.value))}function renderFilters(){const years=[...new Set(projects.map(p=>p.year).filter(Boolean))].sort().reverse();yearFilter.innerHTML='<option value="all">All years</option>'+years.map(y=>`<option>${y}</option>`).join('');const states=[...new Set(projects.map(p=>p.state))].sort();stateFilter.innerHTML='<option value="all">All states</option>'+states.map(s=>`<option value="${s}">${s.replaceAll('_',' ')}</option>`).join('')}function render(){const rows=filtered();const counts=rows.reduce((a,p)=>(a[p.state]=(a[p.state]||0)+1,a),{});cards.innerHTML=[['Total',rows.length,'text-dbs-ink'],['Implemented',counts.IMPLEMENTED||0,'text-dbs-ok'],['Prod Ready',counts.PROD_READY||0,'text-dbs-red'],['Postponed',counts.POSTPONED||0,'text-dbs-warn']].map(([k,v,c])=>`<article class="rounded border border-dbs-line bg-white p-4"><p class="text-sm font-bold text-dbs-muted">${k}</p><p class="mt-2 text-3xl font-black ${c}">${v}</p></article>`).join('');breakdown.innerHTML=Object.entries(counts).map(([k,v])=>`<div><div class="flex justify-between text-sm font-bold"><span>${k.replaceAll('_',' ')}</span><span>${v}</span></div><div class="h-2 rounded bg-dbs-soft"><div class="h-2 rounded bg-dbs-red" style="width:${rows.length?Math.round(v/rows.length*100):0}%"></div></div></div>`).join('')||'<p class="text-sm text-dbs-muted">No data.</p>'}async function load(){if(!api()?.get_projects)return msg('pywebview bridge unavailable.',true);projects=(await api().get_projects()).map(norm);renderFilters();render();if(!projects.length)msg('No projects loaded.')}yearFilter.onchange=render;stateFilter.onchange=render;generateBtn.onclick=async()=>{if(!api()?.generate_report)return msg('generate_report bridge unavailable.',true);const r=await api().generate_report({year:yearFilter.value,state:stateFilter.value});msg(r.ok?'Backend report generated.':r.error,!r.ok)};load();
</script></body></html>
